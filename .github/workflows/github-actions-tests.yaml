name: tests
on: pull_request
jobs:
  run-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.x'
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy matplotlib pandas poliastro krpc pyyaml openmdao[all] 
      - name: Run tests
        run: pytest gcherry/tests
